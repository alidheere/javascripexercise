<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      #colorPreview {
        width: 200px;
        height: 200px;
        border: 1px solid black;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 10px;
      }

      #colorHistory {
        list-style: none;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <h1>Interactive Color Picker</h1>
    <label for="color"> chose a color</label>
    <input type="color" name="color" id="colormaker" />

    <div id="colorPreview">color preview</div>

    <h2>colorHistory</h2>
    <ul id="colorHistory"></ul>

    <button id="clearHistory">clear history</button>

    <script src="apps.js"></script>
  </body>
</html>
